name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/configure-pages@v4

      - name: Install and build
        run: |
          npm ci
          npm run build:gh-pages

      - name: Prepare GitHub Pages output
        run: |
          touch dist/planora/browser/.nojekyll
          cp dist/planora/browser/index.html dist/planora/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/planora/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
