<mat-sidenav-container class="layout">
  <!-- Mobile drawer only -->
  <mat-sidenav
    class="layout__drawer"
    [mode]="'over'"
    [opened]="sidebarOpen()"
    (closedStart)="closeSidebar()"
  >
    <ng-container *ngTemplateOutlet="sidebarNav" />
  </mat-sidenav>

  <mat-sidenav-content class="layout__content">
    <div class="app-shell">
      <!-- Desktop sidebar (in grid, not fixed overlay) -->
      <aside class="app-shell__sidebar">
        <ng-container *ngTemplateOutlet="sidebarNav" />
      </aside>

      <div class="app-shell__body">
        <header class="navbar">
          <button
            class="navbar__menu"
            mat-icon-button
            (click)="toggleSidebar()"
            aria-label="Open menu"
          >
            <mat-icon>menu</mat-icon>
          </button>
          <div class="navbar__brand">
            <span class="brand-logo" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" focusable="false">
                <rect width="32" height="32" rx="8" fill="#6366f1" />
                <path
                  fill="none"
                  stroke="#fff"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M10 13h12v11H10V13z"
                />
                <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M13 10v3M19 10v3" />
                <path
                  fill="none"
                  stroke="#14b8a6"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 20l3 3 6-7"
                />
              </svg>
            </span>
            <span>Planora</span>
          </div>
          <div class="navbar__actions">
            <span class="navbar__badge-wrap">
              <a
                routerLink="/reminders"
                mat-icon-button
                matTooltip="Reminders"
                [matBadge]="(badgeCount$ | async) ?? 0"
                [matBadgeHidden]="((badgeCount$ | async) ?? 0) === 0"
                matBadgeColor="warn"
                matBadgeSize="small"
                matBadgePosition="above after"
              >
                <mat-icon>notifications</mat-icon>
              </a>
            </span>
        <button
          mat-icon-button
          (click)="toggleTheme()"
          [matTooltip]="(settingsService.settings$ | async)?.darkMode ? 'Light mode' : 'Dark mode'"
        >
          <mat-icon>{{
            (settingsService.settings$ | async)?.darkMode ? 'light_mode' : 'dark_mode'
          }}</mat-icon>
        </button>
          </div>
        </header>

        <main class="main">
          <router-outlet />
        </main>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- Shared sidebar markup -->
<ng-template #sidebarNav>
  <div class="sidebar">
    <div class="sidebar__brand">
      <span class="brand-logo" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" focusable="false">
          <rect width="32" height="32" rx="8" fill="#6366f1" />
          <path
            fill="none"
            stroke="#fff"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10 13h12v11H10V13z"
          />
          <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M13 10v3M19 10v3" />
          <path
            fill="none"
            stroke="#14b8a6"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 20l3 3 6-7"
          />
        </svg>
      </span>
      <span>Planora</span>
    </div>
    <nav class="sidebar__nav">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          (click)="closeSidebar()"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="sidebar__footer">
      <small>Productivity Suite v1.0</small>
    </div>
  </div>
</ng-template>

@if (activeReminder(); as reminder) {
  <app-reminder-popup [reminder]="reminder" (dismiss)="dismissReminder()" />
}
